<button
  type="button"
  [id]="controlId()"
  [attr.aria-controls]="expanded ? controlId() + '-region' : null"
  class="h-9 gap-1 p-2 md:h-auto md:p-3 flex cursor-pointer items-center border-b border-gray-600 hover:bg-gray-600"
  (click)="toggle()"
>
  <fa-icon
    [icon]="faChevronRight"
    class="transition-transform"
    [class.rotate-90]="expanded"
  ></fa-icon>
  <span class="me-auto">{{ text() | translate }}</span>
  @if (note(); as note) {
    <span>{{ note | translate }}</span>
  }
</button>

@if (expanded) {
  <div
    [id]="controlId() + '-region'"
    role="region"
    [attr.aria-labelledby]="controlId()"
    class="grid grid-cols-1 grid-rows-[1fr] overflow-hidden transition-[grid-template-rows] duration-300 starting:grid-rows-[0fr]"
    animate.leave="animate-shrink-y"
  >
    <div class="min-h-0 border-b border-gray-600">
      <div class="gap-1 p-4 sm:gap-2 flex flex-col">
        <ng-container [ngTemplateOutlet]="content()"></ng-container>
      </div>
    </div>
  </div>
}
