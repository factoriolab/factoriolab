<div class="flex">
  <div class="relative flex grow basis-2/3">
    <input
      class="input square rounded-s-xs pe-9"
      [class.rounded-e-xs]="!data().abnormalQualities.length && !multi"
      [placeholder]="'filter' | translate"
      [(ngModel)]="filter"
    />

    @if (filter()) {
      <div class="right-0 absolute z-3">
        <button
          type="button"
          aria-hidden="true"
          labButton
          [faIcon]="faXmark"
          (click)="filter.set('')"
        ></button>
      </div>
    } @else {
      <fa-icon
        class="top-2.5 right-2 pointer-events-none absolute z-3 text-gray-500"
        [icon]="faMagnifyingGlass"
      ></fa-icon>
    }
  </div>

  @if (data().abnormalQualities.length) {
    <lab-select
      class="-ms-px basis-1/3"
      [rounded]="multi ? 'none' : 'end'"
      [attr.aria-label]="'picker.qualityFilter' | translate"
      [options]="settingsStore.options().qualities"
      [(ngModel)]="selectedQuality"
    ></lab-select>
  }

  @if (multi) {
    <lab-checkbox
      class="-ms-px border border-gray-600"
      [class.rounded-e-xs]="!recyclingSet().size"
      label="picker.includeAll"
      [ngModel]="allSelected()"
      (ngModelChange)="selectAll($event)"
    ></lab-checkbox>

    @if (recyclingSet().size) {
      <lab-checkbox
        class="rounded-e-xs -ms-px border border-gray-600"
        label="picker.includeAllRecycling"
        [ngModel]="allRecyclingSelected()"
        (ngModelChange)="selectAllRecycling($event)"
      ></lab-checkbox>
    }
  }
</div>

<lab-tabs
  type="category"
  [(value)]="selectedCategory"
  [tabs]="categoryTabs()"
></lab-tabs>
<div class="flex grow flex-col overflow-y-auto">
  @for (ids of categoryRows()[selectedCategory()]; track $index) {
    <div class="flex flex-wrap">
      @for (id of ids; track $index) {
        <button
          type="button"
          labButton
          [iconType]="dialogData.type"
          [icon]="id"
          [border]="id === selectedId"
          [color]="id === selectedId ? 'brand' : 'gray'"
          [toggleIcon]="multi ? faEyeSlash : undefined"
          [toggled]="selection().has(id)"
          [labTooltip]="id"
          [labTooltipType]="dialogData.type"
          [attr.aria-label]="data()[recordKey][id].name"
          (click)="selectId(id)"
        ></button>
      }
    </div>
  }
</div>

@if (multi) {
  <div class="gap-1 sm:gap-2 flex justify-end">
    <button
      type="button"
      class="-ms-px shrink-0"
      labButton
      rounded="end"
      [faIcon]="faRotateLeft"
      text="reset"
      [disabled]="isDefault()"
      (click)="reset()"
    ></button>

    <button
      type="button"
      labButton
      color="brand"
      [faIcon]="faCheck"
      text="ok"
      (click)="dialogRef.close(selection())"
    ></button>
    <button
      type="button"
      labButton
      [faIcon]="faXmark"
      text="cancel"
      (click)="dialogRef.close()"
    ></button>
  </div>
}
