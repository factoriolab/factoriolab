@if (faIcon(); as icon) {
  <fa-icon [icon]="icon"></fa-icon>
}
@if (iconType(); as type) {
  @if (icon(); as icon) {
    <lab-icon
      [type]="type"
      [value]="icon"
      [text]="iconText()"
      [class.opacity-40]="toggled()"
      [class.group-hover:opacity-40]="toggleIcon() != null"
    ></lab-icon>
  }
}
@if (text(); as text) {
  <span class="line-clamp-1 grow" [class]="alignClass()">{{
    text | translate: textParams()
  }}</span>
}
@if (toggleIcon(); as icon) {
  <fa-icon
    class="absolute"
    [class]="
      toggled() ? 'text-gray-400' : 'hidden text-brand-400 group-hover:flex'
    "
    [icon]="icon"
  ></fa-icon>
}
