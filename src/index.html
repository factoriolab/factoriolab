<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FactorioLab</title>
    <base href="/" />
    <meta
      name="description"
      content="A feature-rich factory production calculator for Factorio and
other factory games. Determine resource and machine requirements for your
desired objectives."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />
    <link rel="manifest" href="icons/site.webmanifest" />
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#5bbad5" />
    <link rel="shortcut icon" href="icons/favicon.ico" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#eb9947" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Prefetch the landing image -->
    <link
      rel="prefetch"
      href="icons/factoriolab.webp"
      as="image"
      type="image/webp"
    />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-TFR5Z43GPH"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());

      gtag('config', 'G-TFR5Z43GPH');
    </script>
    <!-- Set up theme -->
    <script>
      const preferences = JSON.parse(localStorage.getItem('preferences'));
      const prefersDark =
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = preferences ? preferences.theme === 'dark' : prefersDark;
      if (useDark) document.documentElement.classList.add('dark');
    </script>
  </head>
  <body class="dark:bg-zinc-950 dark:text-white">
    <lab-root>
      <!-- Pure CSS spinner -->
      <div
        class="flex h-dvh content-center items-center justify-center"
        role="progressbar"
        aria-label="Loading"
      >
        <div class="lab-ring">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
    </lab-root>
    <noscript
      >Please enable JavaScript to continue using this application.</noscript
    >
  </body>
</html>
