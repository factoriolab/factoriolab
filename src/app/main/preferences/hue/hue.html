<div class="flex grow items-center">
  <input
    type="range"
    min="0"
    max="360"
    class="w-full accent-brand-500"
    [disabled]="disabled()"
    [attr.aria-labelledby]="labelledBy() ?? formField?.labelId ?? null"
    [ngModel]="value()"
    (ngModelChange)="setValue($event)"
  />
</div>
<div>
  <input
    type="number"
    min="0"
    max="360"
    class="input"
    [disabled]="disabled()"
    [attr.aria-labelledby]="labelledBy() ?? formField?.labelId ?? null"
    [ngModel]="value()"
    (ngModelChange)="setValue($event)"
  />
</div>
