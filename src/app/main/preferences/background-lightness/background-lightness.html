<lab-checkbox
  [label]="value() == null ? 'preferences.override' : undefined"
  [value]="value() != null"
  (valueChange)="setValue($event ? 50 : undefined)"
></lab-checkbox>

@if (value() != null) {
  <div class="flex grow items-center">
    <input
      type="range"
      min="0"
      max="100"
      required
      class="w-full accent-brand-400"
      [disabled]="disabled()"
      [attr.aria-labelledby]="labelledBy() ?? formField?.labelId ?? null"
      [ngModel]="value()"
      (ngModelChange)="setValue($event)"
    />
  </div>
  <div>
    <input
      type="number"
      min="0"
      max="100"
      step="0.1"
      class="input"
      [disabled]="disabled()"
      [attr.aria-labelledby]="labelledBy() ?? formField?.labelId ?? null"
      [ngModel]="value()"
      [ngModelOptions]="{ updateOn: 'blur' }"
      (ngModelChange)="setValue($event)"
    />
  </div>
}
