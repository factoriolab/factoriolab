<ng-content></ng-content>
<fa-icon
  [icon]="faChevronDown"
  class="flex size-9 items-center justify-center transition-transform"
  size="xs"
></fa-icon>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOpen]="opened()"
  [cdkConnectedOverlayOrigin]="overlayOrigin"
  [cdkConnectedOverlayMinWidth]="elementRef.nativeElement.offsetWidth"
  (overlayOutsideClick)="toggle()"
>
  <div
    [id]="id() + '-listbox'"
    role="listbox"
    [attr.aria-labelledby]="id()"
    class="border-theme-700 bg-theme-950 my-px flex min-w-full flex-col border py-1"
  >
    <ng-content select="lab-option"></ng-content>
  </div>
</ng-template>
