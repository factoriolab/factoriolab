<fa-icon
  class="transition-transform"
  [class.rotate-180]="opened()"
  [icon]="faChevronDown"
  size="xs"
></fa-icon>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOpen]="opened()"
  [cdkConnectedOverlayOrigin]="overlayOrigin"

>
  <div
    [id]="id() + '-listbox'"
    role="listbox"
    [attr.aria-labelledby]="id()"
    class="border-theme-500 mt-px flex flex-col border py-1"
  >
    <ng-content></ng-content>
  </div>
</ng-template>
