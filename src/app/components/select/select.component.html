<div
  #trigger
  [id]="id() + '-trigger'"
  cdkOverlayOrigin
  #overlayOrigin="cdkOverlayOrigin"
>
  hello thingy
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="overlayOrigin"
  [cdkConnectedOverlayOpen]="open()"
  (overlayOutsideClick)="toggle()"
>
  <div
    [id]="id() + '-listbox'"
    role="listbox"
    [attr.aria-labelledby]="id() + '-trigger'"
    class="flex flex-col"
  >
    <ng-content></ng-content>
  </div>
</ng-template>
